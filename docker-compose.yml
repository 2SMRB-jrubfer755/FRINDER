services:
  mongodb:
    image: mongo:7
    container_name: frinder-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: frinder
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: frinder-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/frinder
      NODE_ENV: production
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "127.0.0.1:5000:5000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frinder-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://backend:5000/api
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:80"

volumes:
  mongo_data: